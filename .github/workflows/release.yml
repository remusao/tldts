name: Release

on:
  push:
    branches: ['master']

jobs:
  release:
    name: Trigger release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + all tags: `auto shipit` needs them to compute the
          # version bump and changelog. fetch-depth: 0 yields a non-shallow
          # clone, which avoids the "shallow file has changed" fetch race.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Use node
        uses: actions/setup-node@v4
        with:
          cache: yarn
          node-version-file: '.tool-versions'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Bundle
        run: yarn bundle

      - name: Lint
        run: yarn lint

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc
        run: |
          : > "$NPM_CONFIG_USERCONFIG"
          yarn release
